server:
  port: 8082
  servlet:
    context-path: /
  shutdown: graceful

spring:
  application:
    name: cart-service

  # Virtual Threads (Java 21)
  threads:
    virtual:
      enabled: true
  
  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cartdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: CartServiceHikariCP
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false
  
  # Flyway Migrations
  flyway:
    enabled: false
  
  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # Auto Configuration - Exclude Kafka & Security
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

  # Security (Disabled via autoconfigure exclude above)
  security:
    user:
      name: admin
      password: admin123

# Eureka Service Discovery (Disabled)
eureka:
  client:
    enabled: false

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      inventoryService:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      pricingService:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      validate-group-membership: false

# Application Specific Configuration
app:
  name: ${spring.application.name}
  version: 1.0.0
  cart:
    max-items: 50
    expiry-hours: 24
    reservation-timeout-minutes: 15
  client:
    inventory-service:
      url: http://localhost:8083
    pricing-service:
      url: http://localhost:8084
    promotion-service:
      url: http://localhost:8085
    order-service:
      url: http://localhost:8086
    notification-service:
      url: http://localhost:8087
    user-service:
      url: http://localhost:8081
  payment:
    tax-rate: 0.18
    free-shipping-threshold: 500
    standard-shipping-fee: 50
    currency-code: INR
    country-code: IN

# Logging Configuration
logging:
  level:
    root: INFO
    com.infy.ekart.cartservice: DEBUG

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.infy.ekart.cartservice.controller