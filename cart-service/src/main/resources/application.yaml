server:
  port: 8082
  servlet:
    context-path: /
  shutdown: graceful

spring:
  application:
    name: cart-service

  threads:
    virtual:
      enabled: true
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cartdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: CartServiceHikariCP
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false
  
  flyway:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

eureka:
  client:
    enabled: false

resilience4j:
  circuitbreaker:
    instances:
      inventoryService:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      pricingService:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      validate-group-membership: false

app:
  name: ${spring.application.name}
  version: 1.0.0
  cart:
    max-items: 50
    expiry-hours: 24
    reservation-timeout-minutes: 15
  client:
    inventory-service:
      url: http://localhost:8083
    order-service:
      url: http://localhost:8086
  payment:
    tax-rate: 0.18
    free-shipping-threshold: 500
    standard-shipping-fee: 50
    currency-code: INR
    country-code: IN

logging:
  level:
    root: INFO
    com.infy.ekart.cartservice: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.infy.ekart.cartservice.controller