server:
  port: 8083

spring:
  application:
    name: product-service

  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/ekart_product_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ProductServiceHikariCP
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Disable Redis and Kafka auto-configuration
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Eureka Service Discovery
eureka:
  client:
    enabled: false

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Application Configuration
app:
  name: ${spring.application.name}
  version: 1.0.0
  client:
    cart-service:
      url: http://localhost:8082

# Logging
logging:
  level:
    root: INFO
    com.infy.ekart.productservice: DEBUG
    org.hibernate.SQL: WARN
    org.springframework.security: INFO

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
  packages-to-scan: com.infy.ekart.productservice.controller
  show-actuator: false
  show-spring-cloud-functions: false