server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/products/**, /api/v1/categories/**, /api/v1/brands/**
        - id: cart-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/carts/**
          filters:
            - PreFlightFilter
        - id: order-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - PreFlightFilter
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - PreFlightFilter
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/email/**, /api/v1/send-welcome, /api/v1/verify-code,
              /api/v1/order-confirmation, /api/v1/forgot-password, /api/v1/verify-google,
              /api/v1/shipping-update, /api/v1/payment-confirmation
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

  # Added to fix DataSource auto‑configuration
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  security:
    jwt:
      secret: mysupersecurekeymysupersecurekey12345678
      expiration: 3600000
  autoconfigure:
    exclude: 
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration

resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000ms

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls-primary-name: eKart API Gateway
    urls:
      - name: auth-service
        url: http://localhost:8081/v3/api-docs
      - name: product-service
        url: http://localhost:8083/v3/api-docs
      - name: cart-service
        url: http://localhost:8082/v3/api-docs
      - name: order-service
        url: http://localhost:8086/v3/api-docs
      - name: payment-service
        url: http://localhost:8084/v3/api-docs
      - name: notification-service
        url: http://localhost:8085/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    com.infy.ekart: DEBUG