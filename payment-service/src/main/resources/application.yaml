server:
  port: 8084

spring:
  application:
    name: payment-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/ekart_payment_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: PaymentServiceHikariCP
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

eureka:
  client:
    enabled: false

# Application Configuration
app:
  name: ${spring.application.name}
  version: 1.0.0
  client:
    order-service:
      url: http://localhost:8086
  payment:
    currency: INR
    gateway: RAZORPAY

# Logging Configuration
logging:
  file:
    path: logs/
    name: logs/payment-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 100MB
  level:
    root: INFO
    com.infy.ekart: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %clr([%X{requestId:-}]){cyan} %-5level %logger{20} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{requestId:-}] [%thread] %-5level %logger{36} - %msg%n"

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.infy.ekart.paymentservice.controller
  show-actuator: false