server:
  port: 8081

spring:
  application:
    name: auth-service
  
  flyway:
    enabled: false

  datasource:
    url: jdbc:mysql://localhost:3306/ekart_auth_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  data:
    redis:
      host: localhost
      port: 6379

  # Disable Kafka auto-configuration if not using it
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

eureka:
  client:
    enabled: false

# JWT Configuration
jwt:
  secret: mysupersecurekeymysupersecurekey12345678
  expiration: 3600000        # 1 hour
  refresh-expiration: 604800000  # 7 days

# Logging
logging:
  level:
    root: INFO
    com.infy.ekart: DEBUG
    org.springframework.security: DEBUG

# SpringDoc OpenAPI / Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    filter: false
    try-it-out-enabled: true
    doc-expansion: list
  show-actuator: false
  show-spring-cloud-functions: false