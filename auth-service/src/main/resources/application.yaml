server:
  port: 8081

spring:
  application:
    name: auth-service
  flyway:
    enabled: false

  datasource:
    url: jdbc:mysql://localhost:3306/ekart_auth_service
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  data:
    redis:
      host: localhost
      port: 6379


eureka:
 client:
  enabled: false 

jwt:
  secret: mysupersecurekeymysupersecurekey12345678
  expiration: 3600000        # 1 hour
  refresh-expiration: 604800000

logging:
  level:
    root: INFO
    com.infy.ekart: DEBUG